<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0f766e">
  <meta name="description" content="Kalkulator harga jual marketplace.">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="style.css">
  <title>MarketPrice</title>
</head>
<body>
  <main class="app-shell">
    <header class="app-header">
      <div><p class="eyebrow">KALKULATOR HARGA JUAL</p><h1>MarketPrice</h1></div>
      <button id="theme-toggle" class="icon-button" type="button" aria-label="Ubah tema" title="Ubah tema">☾</button>
    </header>

    <section class="panel" aria-labelledby="input-title">
      <h2 id="input-title">Data produk</h2>
      <div class="fields">
        <label class="field full"><span>Harga Modal</span><div class="money-input"><b>Rp</b><input id="supplier-price" inputmode="numeric" autocomplete="off" placeholder="10.000" aria-describedby="validation-message"></div></label>
        <label class="field"><span>Margin (%)</span><div class="percent-input"><input id="margin-percent" inputmode="decimal" autocomplete="off" placeholder="10"><b>%</b></div></label>
        <label class="field"><span>Margin tetap</span><div class="money-input"><b>Rp</b><input id="fixed-margin" inputmode="numeric" autocomplete="off" placeholder="1.000"></div></label>
        <label class="field"><span>Fee marketplace (%)</span><div class="percent-input"><input id="marketplace-fee-percent" inputmode="decimal" autocomplete="off" placeholder="30"><b>%</b></div></label>
        <label class="field"><span>Fee tetap marketplace</span><div class="money-input"><b>Rp</b><input id="marketplace-fixed-fee" inputmode="numeric" autocomplete="off" placeholder="1.600"></div></label>
      </div>
      <p id="validation-message" class="validation" role="status"></p>
    </section>

    <section class="results" aria-live="polite" aria-label="Hasil perhitungan">
      <article class="result-card selling"><p>Harga Jual</p><strong id="selling-price">—</strong></article>
      <article class="result-card profit"><p>Profit Bersih</p><strong id="net-profit">—</strong></article>
      <article class="result-card fee"><p>Biaya Marketplace</p><strong id="marketplace-fee">—</strong></article>
    </section>

    <details class="details-panel">
      <summary>Detail perhitungan</summary>
      <dl>
        <div><dt>Harga sebelum pembulatan</dt><dd id="pre-rounding-price">—</dd></div>
        <div><dt>Profit margin</dt><dd id="margin-profit">—</dd></div>
        <div><dt>Admin Fee</dt><dd id="admin-fee">Rp6.600</dd></div>
        <div><dt>Pembulatan</dt><dd id="rounding-difference">—</dd></div>
      </dl>
    </details>

    <div class="actions">
      <button id="copy-button" class="button primary" type="button" disabled>Salin Harga Jual</button>
      <button id="reset-button" class="button secondary" type="button">Reset</button>
    </div>
    <footer>
      <div>MarketPrice <span>v1.0.2</span></div>
      <div class="watermark">Dhavinci</div>
    </footer>
  </main>
  <div id="toast" class="toast" role="status"></div>
  <script src="script.js"></script>
</body>
</html>
